<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Enhancer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4">
    <div class="max-w-md mx-auto">
        <h2 class="text-2xl font-bold text-center mb-6">Photo Enhancer Pro</h2>
        
        <input type="file" id="fileInput" accept="image/*" class="w-full p-3 bg-gray-800 rounded-lg border border-gray-700 mb-4">
        
        <canvas id="canvas" class="w-full rounded-xl mb-4 hidden border-2 border-blue-500"></canvas>
        
        <button id="processBtn" class="w-full bg-blue-600 py-4 rounded-xl font-bold hidden mb-3">AI फिल्टर लगाएँ</button>
        <a id="downloadBtn" class="w-full bg-green-600 py-4 rounded-xl font-bold text-center hidden">डाउनलोड करें</a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        let img = new Image();

        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    canvas.classList.remove('hidden');
                    processBtn.classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        processBtn.onclick = () => {
            // यहाँ फिल्टर अप्लाई हो रहा है (Canvas पर)
            ctx.filter = 'contrast(1.2) brightness(1.1) saturate(1.3) sepia(0.1)';
            ctx.drawImage(img, 0, 0);
            
            // अब जो दिख रहा है, वही डाउनलोड होगा
            downloadBtn.href = canvas.toDataURL('image/jpeg');
            downloadBtn.download = "Enhanced_Photo.jpg";
            downloadBtn.classList.remove('hidden');
            processBtn.innerText = "प्रोसेस पूरी हुई!";
        };
    </script>
</body>
</html>
