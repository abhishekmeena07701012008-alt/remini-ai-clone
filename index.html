<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Enhancer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4">
    <div class="max-w-md mx-auto">
        <h2 class="text-2xl font-bold text-center mb-6">Photo Enhancer Pro</h2>
        
        <input type="file" id="fileInput" accept="image/*" class="w-full p-3 bg-gray-800 rounded-lg border border-gray-700 mb-4">
        
        <img id="displayImg" class="w-full rounded-xl mb-4 hidden border-2 border-blue-500">
        
        <button id="processBtn" class="w-full bg-blue-600 py-4 rounded-xl font-bold hidden mb-3">AI फिल्टर लगाएँ</button>
        <a id="downloadBtn" class="w-full bg-green-600 py-4 rounded-xl font-bold text-center hidden">गैलरी में सेव करें</a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const displayImg = document.getElementById('displayImg');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        // फोटो चुनते ही दिखाओ
        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                displayImg.src = event.target.result;
                displayImg.classList.remove('hidden');
                processBtn.classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // फिल्टर लगाने का बटन
        processBtn.onclick = () => {
            // यहाँ हम AI प्रोसेसिंग का इफ़ेक्ट दे रहे हैं
            // (यह CSS फिल्टर का इस्तेमाल कर रहा है जो पिक्सल पर काम करता है)
            displayImg.style.filter = "contrast(1.2) brightness(1.1) saturate(1.3) sharpen(2px)";
            
            // अब डाउनलोड बटन दिखाओ
            downloadBtn.href = displayImg.src;
            downloadBtn.download = "Enhanced_Photo.jpg";
            downloadBtn.classList.remove('hidden');
            processBtn.innerText = "प्रोसेस पूरी हुई!";
        };
    </script>
</body>
</html>
