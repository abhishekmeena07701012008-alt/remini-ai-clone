<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>AI Photo Enhancer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        img, canvas { max-width: 400px; border: 2px solid #ccc; }
    </style>
</head>
<body>
    <h2>AI Photo Enhancer</h2>
    <input type="file" id="upload" accept="image/*">
    <div class="container">
        <div><p>Before</p><img id="beforeImg" src="" style="display:none"></div>
        <div><p>After (AI Enhanced)</p><canvas id="canvas"></canvas></div>
    </div>
    <br>
    <button id="downloadBtn" style="display:none">Download Enhanced Photo</button>

    <script src="script.js"></script>
</body>
</html>
