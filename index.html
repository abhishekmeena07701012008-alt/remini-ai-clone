<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pimple Remover & Skin Smooth</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <style>
        /* प्रीमियम डार्क थीम डिज़ाइन */
        body { 
            text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; color: #ffffff; padding: 20px; margin: 0;
        }
        h1 { color: #00d2ff; text-shadow: 0 0 10px rgba(0,210,255,0.5); }
        .upload-box { margin: 20px auto; padding: 20px; background: #1e1e1e; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input[type="file"] { color: white; cursor: pointer; }
        
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .img-box { background: #1e1e1e; padding: 10px; border-radius: 12px; transition: 0.3s; }
        img, canvas { max-width: 100%; height: auto; width: 300px; border-radius: 8px; border: 2px solid #333; }
        
        button { 
            padding: 12px 25px; margin: 10px; cursor: pointer; font-size: 16px; font-weight: bold;
            border: none; border-radius: 8px; transition: 0.3s; 
        }
        #filterBtn { background: linear-gradient(45deg, #4caf50, #8bc34a); color: white; box-shadow: 0 0 10px rgba(76,175,80,0.5); }
        #downloadBtn { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; box-shadow: 0 0 10px rgba(0,210,255,0.5); }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555; cursor: wait; box-shadow: none; }

        /* स्टेटस टेक्स्ट */
        #status { color: #888; margin-top: 10px; font-style: italic; }

        /* शानदार डाउनलोड पॉप-अप (Toast Notification) */
        #popup {
            visibility: hidden; min-width: 250px; background-color: #4caf50; color: #fff;
            text-align: center; border-radius: 10px; padding: 15px; position: fixed; 
            z-index: 10; left: 50%; bottom: 30px; transform: translateX(-50%);
            font-size: 16px; font-weight: bold; box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            opacity: 0; transition: opacity 0.5s, bottom 0.5s;
        }
        #popup.show { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
</head>
<body>
    <h1>✨ Pimple Remover AI ✨</h1>
    
    <div class="upload-box">
        <input type="file" id="upload" accept="image/*">
    </div>
    
    <div id="status">फोटो अपलोड करें भाई...</div>

    <div class="container">
        <div class="img-box" id="beforeBox" style="display:none;">
            <p>Original</p>
            <img id="beforeImg" src="">
        </div>
        <div class="img-box" id="afterBox" style="display:none;">
            <p>Clean Face</p>
            <canvas id="canvas"></canvas>
        </div>
    </div>
    
    <br>
    <button id="filterBtn" style="display:none">✨ Clean Pips & Smooth Skin</button>
    <button id="downloadBtn" style="display:none">⬇️ Download Clean Photo</button>

    <div id="popup">✅ फोटो डाउनलोड हो गई भाई!</div>

    <script src="script.js"></script>
</body>
</html>
