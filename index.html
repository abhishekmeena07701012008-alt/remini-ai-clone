<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Beauty Enhancer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4">
    <div class="max-w-md mx-auto text-center">
        <h2 class="text-2xl font-bold mb-6">✨ Beauty Enhancer Pro</h2>
        
        <input type="file" id="fileInput" accept="image/*" class="w-full p-3 bg-gray-800 rounded-lg mb-4">
        
        <canvas id="canvas" class="w-full rounded-xl mb-4 hidden border-2 border-pink-500"></canvas>
        
        <button id="processBtn" class="w-full bg-pink-600 py-4 rounded-xl font-bold hidden mb-3">स्किन ग्लो और स्मूथ करें</button>
        <a id="downloadBtn" class="w-full bg-green-600 py-4 rounded-xl font-bold text-center hidden">डाउनलोड HD फोटो</a>
        
        <div id="popup" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-green-500 px-6 py-3 rounded-full shadow-lg hidden">
            ✅ फोटो गैलरी में सेव हो गई!
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const popup = document.getElementById('popup');
        let img = new Image();

        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    canvas.classList.remove('hidden');
                    processBtn.classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        processBtn.onclick = () => {
            // 'Bilateral' जैसी तकनीक का इफ़ेक्ट (स्किन ग्लो के लिए)
            ctx.filter = 'blur(0.5px) contrast(1.1) saturate(1.2) brightness(1.05)';
            ctx.drawImage(img, 0, 0);
            
            // ओवरले ग्लो इफेक्ट
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            downloadBtn.classList.remove('hidden');
            processBtn.innerText = "प्रोसेस पूरी हुई!";
        };

        downloadBtn.onclick = () => {
            // पॉपअप दिखाने का कोड
            popup.classList.remove('hidden');
            setTimeout(() => popup.classList.add('hidden'), 3000);
        };
    </script>
</body>
</html>
